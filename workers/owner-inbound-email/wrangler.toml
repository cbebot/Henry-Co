# Henry Onyx — owner inbound-email Worker (Cloudflare Email Routing target).
#
# Deploy:  cd workers/owner-inbound-email && npm install && npx wrangler deploy
# Secret:  npx wrangler secret put INBOUND_EMAIL_WEBHOOK_SECRET
#          (must match INBOUND_EMAIL_WEBHOOK_SECRET on the hub app)
#
# Then: Email Service > Email Routing > Routing Rules > enable the Catch-all rule
#   -> Action "Send to a Worker" -> this Worker.
#
# Dependency-free: no npm imports, no nodejs_compat needed. The dashboard editor
# can host this directly (paste src/index.ts).

name = "henry-onyx-inbound-email"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[vars]
# The deployed hub app webhook URL.
INBOUND_WEBHOOK_URL = "https://hq.henryonyx.com/api/inbound/email"
# Max raw message bytes to forward (keeps the POST under the ~4.5 MB body limit).
MAX_RAW_BYTES = "2500000"

# INBOUND_EMAIL_WEBHOOK_SECRET is a SECRET — never put it here.
# Set it with: npx wrangler secret put INBOUND_EMAIL_WEBHOOK_SECRET
