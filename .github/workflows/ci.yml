# Canonical CI for HenryCo — GitHub is the single source of truth.
# Do not duplicate this pipeline on GitLab or other hosts.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Manual re-run lever: GitHub occasionally drops webhook-driven events for a
  # while (observed 2026-06-11: pull_request opened/synchronize/reopened all
  # produced no runs). Dispatching against the PR branch reports check runs on
  # the same head sha, so the PR's required check still lights up.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  # Placeholders so Next.js apps can compile in CI without real secrets.
  # Vercel preview/production still inject real values at deploy time.
  NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.ci-placeholder-signature
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.ci-placeholder-signature
  NEXT_PUBLIC_BASE_DOMAIN: henrycogroup.com

jobs:
  lint-typecheck-test-build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (all apps)
        run: pnpm run lint:all

      - name: Typecheck (all apps)
        run: pnpm run typecheck:all

      # V3-18: render real receipt/invoice PDFs and assert the LEGAL/PRESENTATION layer
      # the SQL invariants don't cover — issuer = "Henry Onyx Limited" + RC + TIN +
      # registered office (config-sourced, no literals), the VAT line present iff the
      # breakdown carries it, static labels localized across locales, and NO processor /
      # retired-brand string in any rendered byte. A regression in buildDocumentIssuer,
      # the i18n copy, or the @react-pdf templates now fails CI instead of shipping green.
      - name: Prove receipt/invoice render (issuer · VAT · locales · no-processor)
        run: pnpm --filter @henryco/account run prove:receipts

      # DRIFT-SWEEP-02: fail CI when code references a Supabase column that does
      # not exist in the committed schema (database.types.ts ∪ migration DDL).
      # This is the 4th incident of "code ships a query for a column prod lacks"
      # (profiles.user_id, customer_profiles.kyc_completed_at, henry_events.outcome,
      # studio_settings.id) — TypeScript can't catch string-built queries on
      # loosely-typed admin clients. Baseline-gated: fails only on NEW drift.
      - name: Schema-drift guard (code ↔ schema column references)
        run: pnpm run schema-drift:check

      - name: i18n hardcoded-text gate (V3-07 S8 — strict)
        run: pnpm run i18n:check:strict

      - name: Company-voice tone gate (TONE-01 — voice.ts is law)
        run: pnpm run tone:check

      - name: Test (super-app)
        run: pnpm run test:workspace

      - name: Build validation (Next.js apps; Expo super-app skipped if no build script)
        run: pnpm run build:all

  payments-grant-invariant:
    # FL1 backstop (V3-15-FIX-01): assert the money RPCs are NOT executable by
    # anon/authenticated on a freshly-migrated DB. RED if a money writer ever
    # becomes self-callable again (self-confirm-without-paying). See
    # docs/v3/v3-15-fl2-payments-schema-isolation-hardening.md.
    name: Payments money-RPC grant invariant
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Reproduce Supabase roles + default privileges (makes the test meaningful)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/_bootstrap_supabase_env.sql

      - name: Apply payment_intents migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260529120000_payment_intents.sql

      - name: Assert money-RPC grant invariant (anon/authenticated=false; writers service_role=true)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/payments_grant_invariant.sql

      # V3-17: continue to the post-isolation END STATE — move the writers into the
      # non-exposed payments_private schema, add the double-entry ledger, and assert
      # the grant invariant covers the ledger functions too (anon/authenticated zero reach).
      - name: Apply payments_private isolation migration
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260605123000_payments_private_isolation.sql

      - name: Apply double-entry ledger migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260607120000_double_entry_ledger.sql

      - name: Prove ledger invariants (balance · immutable · idempotent · reconcile)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/ledger_invariants.sql

      - name: Assert ledger money-RPC grant invariant (payments_private end state)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/ledger_grant_invariant.sql

      # V3-18: persisted, ledger-tied receipts & invoices. Apply the document
      # migration on the same fresh DB and prove its invariants (HO- numbering,
      # idempotent generation, the receipt-total↔ledger reconciliation tie, RLS,
      # and the document-writer grant invariant).
      - name: Apply payment-documents migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260607130000_v3_18_payment_documents.sql

      - name: Prove payment-document invariants (number · idempotent · ledger-reconcile · RLS · grants)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/payment_documents_invariants.sql

      # V3-VAT-01: make VAT strong — output VAT on sales + input/fee VAT on the absorbed
      # processor fee. Apply the VAT migration on the same fresh DB, then prove the
      # settlement fee-split (debit total still = gross), output-VAT recognition, the
      # exact net-VAT reconciliation, refund-readiness — and that the money-RPC grant
      # lockdown still holds for the new/changed (fee-aware) signatures.
      - name: Apply V3-VAT-01 settlement+VAT migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260607140000_v3_vat_01_settlement_vat.sql

      - name: Prove VAT invariants (fee-split · output VAT · reconciliation · balance · refund-ready)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/vat_invariants.sql

      - name: Assert VAT money-RPC grant invariant (fee-aware end state)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/vat_grant_invariant.sql

      # V3-19: the full refund lifecycle — provider-confirmed only, over-refund
      # impossible by construction (DB trigger), proportional output-VAT reversal,
      # unfakeable credit-note binding, wallet hold/release with never-negative +
      # reconciliation invariants. Apply the refunds migration on the same fresh
      # DB and prove all of it, then assert the grant lockdown covers the new
      # refund/credit-note writers.
      - name: Apply V3-19 refunds migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260611130000_v3_19_refunds.sql

      - name: Prove refund invariants (full · partial-VAT · over-refund · dedup · failed-revert · credit-note · wallet)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/refunds_invariants.sql

      - name: Assert refunds money-RPC grant invariant (V3-19 end state)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/refunds_grant_invariant.sql

      # SEC-HARDEN-01: lock down the SECURITY DEFINER audit writers (same revoke
      # discipline as the money RPCs). The two writers + is_staff_in_any live on
      # prod out-of-band (not created by any FL2 migration), so create faithful
      # stubs with the real signatures AFTER the Supabase-like default privileges
      # are in effect — each stub is then auto-granted EXECUTE to anon +
      # authenticated DIRECTLY, reproducing the exact production hole. Apply the
      # lockdown migration and assert the end-state: add_audit_log is
      # service-role-only (anon + authenticated dead — the unguarded forge hole);
      # add_audit_log_v2 keeps the guarded authenticated-staff path but anon is
      # dead. The bucket drop in the migration self-skips here (no Storage schema
      # on the vanilla chain — proven on the prod-actual surface instead).
      - name: Seed audit-writer stubs (reproduce the prod grant hole)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/audit_fns_min.sql

      - name: Apply SEC-HARDEN-01 audit-grant lockdown migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260612120000_sec_harden_01_audit_grants_and_bucket.sql

      - name: Assert audit-writer grant invariant (v1 service-role-only; v2 staff-scoped; anon dead on both)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/audit_grant_invariant.sql

      # SEC-HARDEN-02: close the world-writable role-membership privilege
      # escalation. The five *_role_memberships tables + their staff-gate functions
      # + the "Service role full access"(true) world-writable policies live on prod
      # out-of-band (division feature migrations + dashboard edits), not in any FL2
      # migration — so reproduce the exact pre-fix surface (tables, the standing
      # anon/authenticated write grant, the world-writable policy, the
      # authenticated staff-write policies) with the membership fixture, apply the
      # lockdown migration, and assert the end-state: NO request role holds a
      # membership write (grant + policy), service_role keeps the admin path, a
      # SELECT self-read survives, and an authenticated INSERT is rejected. The
      # company_pages drop in the migration self-skips here (no company_pages table
      # on the vanilla chain — proven on the prod-actual surface instead).
      - name: Seed role-membership surface (reproduce the prod self-escalation hole)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/membership_min.sql

      - name: Apply SEC-HARDEN-02 role-membership lockdown migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260612140000_sec_harden_02_role_membership_lockdown.sql

      - name: Assert role-membership write-lockdown invariant (writes service-role-only; authenticated INSERT rejected)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/membership_grant_invariant.sql

      # SEC-HARDEN-03: close the world-writable DATA-table class. The same
      # "Service role full access" FOR ALL TO public USING(true) policy that
      # SEC-HARDEN-02 removed from the membership tables also sits on ~40
      # non-membership data tables (jobs/logistics/referral/trust/platform/studio +
      # hub_homepage_content) out-of-band — a data-integrity/confidentiality hole,
      # not escalation. Reproduce a representative slice (one+ table per disposition:
      # service-role-only, public-reference-read, legitimate-authenticated-writer,
      # and the deferred money-adjacent studio_payments), apply the lockdown
      # migration, and assert the end-state: locked tables are service-role-write
      # only, Cat-2 keeps a public read, Cat-3 keeps its scoped writer, no new
      # world-writable table appears outside the documented deferral allowlist, an
      # authenticated INSERT is rejected, and the academy seed is reconciled.
      - name: Seed world-writable data surface (reproduce the prod data-integrity hole)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/sec_harden_03_min.sql

      - name: Apply SEC-HARDEN-03 world-writable lockdown migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260614120000_sec_harden_03_world_writable_lockdown.sql

      - name: Assert world-writable data-table lockdown invariant (writes service-role-only; class-drift guarded; authenticated INSERT rejected)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/sec_harden_03_grant_invariant.sql
