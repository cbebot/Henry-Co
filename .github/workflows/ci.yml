# Canonical CI for HenryCo — GitHub is the single source of truth.
# Do not duplicate this pipeline on GitLab or other hosts.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  # Placeholders so Next.js apps can compile in CI without real secrets.
  # Vercel preview/production still inject real values at deploy time.
  NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.ci-placeholder-signature
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.ci-placeholder-signature
  NEXT_PUBLIC_BASE_DOMAIN: henrycogroup.com

jobs:
  lint-typecheck-test-build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (all apps)
        run: pnpm run lint:all

      - name: Typecheck (all apps)
        run: pnpm run typecheck:all

      - name: i18n hardcoded-text gate (V3-07 S8 — strict)
        run: pnpm run i18n:check:strict

      - name: Test (super-app)
        run: pnpm run test:workspace

      - name: Build validation (Next.js apps; Expo super-app skipped if no build script)
        run: pnpm run build:all

  payments-grant-invariant:
    # FL1 backstop (V3-15-FIX-01): assert the money RPCs are NOT executable by
    # anon/authenticated on a freshly-migrated DB. RED if a money writer ever
    # becomes self-callable again (self-confirm-without-paying). See
    # docs/v3/v3-15-fl2-payments-schema-isolation-hardening.md.
    name: Payments money-RPC grant invariant
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Reproduce Supabase roles + default privileges (makes the test meaningful)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/_bootstrap_supabase_env.sql

      - name: Apply payment_intents migration (fresh)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/migrations/20260529120000_payment_intents.sql

      - name: Assert money-RPC grant invariant (anon/authenticated=false; writers service_role=true)
        run: psql -v ON_ERROR_STOP=1 -f apps/hub/supabase/tests/payments_grant_invariant.sql
