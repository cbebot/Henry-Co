name: HenryCo Super App CI

on:
  push:
    paths:
      - "apps/super-app/**"
      - ".github/workflows/henryco-super-app-ci.yml"
  pull_request:
    paths:
      - "apps/super-app/**"
      - ".github/workflows/henryco-super-app-ci.yml"

jobs:
  super-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/super-app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test:ci
